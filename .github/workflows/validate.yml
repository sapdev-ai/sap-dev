name: validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: validate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Schema-validate marketplace.json
        run: bash scripts/validate-json-schemas.sh

      - name: Consistency check
        run: node scripts/check-consistency.mjs

      # Offline contract-lint for generated ABAP. The --selftest seeds known
      # good/bad ABAP snippets and asserts the lint classifies them correctly,
      # so the rule engine itself is gated. When tests/fixtures/ goldens land
      # (P2), add a step that lints each golden via:
      #   node scripts/lint-abap-contract.mjs <golden.abap> --work-folder <dir>
      - name: ABAP contract-lint self-test
        run: node scripts/lint-abap-contract.mjs --selftest
