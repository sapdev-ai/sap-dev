name: validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: validate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Schema-validate marketplace.json
        run: bash scripts/validate-json-schemas.sh

      - name: Consistency check
        run: node scripts/check-consistency.mjs

      # Offline contract-lint for generated ABAP. The --selftest seeds known
      # good/bad ABAP snippets and asserts the lint classifies them correctly,
      # so the rule engine itself is gated. When tests/fixtures/ goldens land
      # (P2.3), add a step that lints each golden via:
      #   node scripts/lint-abap-contract.mjs <golden.abap> --work-folder <dir> --fixture
      # (--fixture turns silent signature-skips into SNAPSHOT_INCOMPLETE errors,
      #  so an incomplete RFC snapshot can no longer green-wash a fixture run.)
      - name: ABAP contract-lint self-test
        run: node scripts/lint-abap-contract.mjs --selftest

      # Offline skeleton-diff: the logic-regression net (dropped/re-mapped spec
      # rules) the contract-lint cannot be. --selftest gates the diff engine on
      # seeded good / dependency-drop / pair-swap cases. When fixtures land
      # (P2.3), add a per-golden step:
      #   node scripts/diff-abap-skeleton.mjs --work-folder <dir> --program <stem> --case <case.json>
      - name: ABAP skeleton-diff self-test
        run: node scripts/diff-abap-skeleton.mjs --selftest
